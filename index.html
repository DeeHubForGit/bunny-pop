<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny Pop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">🐰 Bunny Pop 🐰</h1>
        
        <div class="info-bar">
            <div class="score-display">
                Score: <span id="score">0</span>
            </div>
            <div class="timer-display">
                Time: <span id="timer">40</span>s
            </div>
        </div>

        <div class="speed-control">
            <label for="speed-slider" class="speed-label">Bunny Speed</label>
            <input type="range" id="speed-slider" min="1" max="5" step="1" value="3">
            <div class="speed-labels">
                <span class="speed-left">🐢 Turtle Slow</span>
                <span class="speed-right">⚡ Super Speedy</span>
            </div>
            <div id="speed-text" class="speed-text">Level 3: Just Right</div>
        </div>

        <div id="game-container" class="game-container">
            <button id="start-btn" class="start-btn">Start Game</button>
            <button id="play-again-btn" class="start-btn hidden">Play Again</button>
        </div>

        <div id="game-over" class="game-over hidden">
            <h2>Game Over!</h2>
            <p class="final-score">Score: <span id="final-score">0</span></p>
            <p id="message" class="message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
