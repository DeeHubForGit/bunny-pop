<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny Pop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="title">🐰 Bunny Pop 🐰</h1>
        
        <div class="info-bar">
            <div class="score-display">
                <div class="score-content">
                    Score: <span id="score">0</span>
                </div>
                <button id="view-scores-btn" class="view-scores-btn">Scores</button>
            </div>
            <div class="timer-display">
                <div class="timer-top-row">
                    <span class="timer-label">Time:</span>
                    <span id="timer-countdown" class="timer-countdown">0s</span>
                </div>
                <select id="time-selector" class="time-selector">
                    <option value="20">20s</option>
                    <option value="40" selected>40s</option>
                    <option value="60">60s</option>
                    <option value="120">120s</option>
                </select>
            </div>
        </div>

        <div class="speed-control">
            <label for="speed-slider" class="speed-label">Bunny Speed</label>
            <input type="range" id="speed-slider" min="1" max="5" step="1" value="3">
            <div class="speed-labels">
                <span class="speed-left">🐢 Turtle Slow</span>
                <span class="speed-right">⚡ Super Speedy</span>
            </div>
            <div id="speed-text" class="speed-text">Level 3: Just Right</div>
        </div>

        <div id="game-container" class="game-container">
            <button id="start-btn" class="start-btn">Start Game</button>
            <div id="game-over" class="game-over hidden">
                <h2>Game Over!</h2>
                <p class="final-score">Score: <span id="final-score">0</span></p>
                <p class="final-duration">Time: <span id="final-duration">40</span>s</p>
                <p id="message" class="message"></p>
                <button id="play-again-btn" class="play-btn">Play Again</button>
            </div>
        </div>
        <!-- Copyright notice -->
        <div id="copyright">
            Made by Dee for Bonnie 💖<br> 
            © 2026 Dee Bath
        </div>
    </div>

    <!-- Score Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-panel">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title"></h2>
                <button id="modal-close-btn" class="modal-close-btn">×</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-actions" class="modal-actions"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
